<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Course</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea {
            width: 400px; padding: 8px; box-sizing: border-box;
        }
        textarea { height: 100px; }
        button {
            padding: 8px 20px; background: #007bff; color: white;
            border: none; cursor: pointer;
        }
        button:hover { background: #0056b3; }
        a { margin-left: 10px; }
        .row { display: flex; gap: 20px; }
    </style>
</head>
<body>

    <h1 th:text="${course.id} != null ? 'Sửa Khóa học' : 'Thêm Khóa học mới'">Form</h1>

    <form th:action="@{/admin/course/save}" th:object="${course}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label>Tên khóa học</label>
            <input type="text" th:field="*{title}" required>
        </div>

        <div class="form-group">
            <label>Slug (URL)</label>
            <input type="text" th:field="*{slug}" required>
        </div>

        <div class="form-group">
            <label>Mô tả ngắn (subtitle)</label>
            <input type="text" th:field="*{subtitle}">
        </div>

        <div class="form-group">
            <label>Mô tả chi tiết</label>
            <textarea th:field="*{description}"></textarea>
        </div>

        <div class="form-group">
            <label>Ảnh thumbnail (URL)</label>
            <input type="text" th:field="*{thumbnailUrl}">
        </div>

        <div class="form-group">
            <label>Video giới thiệu (URL)</label>
            <input type="text" th:field="*{previewVideoUrl}">
        </div>

        <div class="row">
            <div class="form-group">
                <label>Danh mục</label>
                <select th:field="*{category}">
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Giảng viên</label>
                <select th:field="*{instructor}">
                    <option th:each="ins : ${instructors}"
                            th:value="${ins.id}"
                            th:text="${ins.fullname}">
                    </option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Cấp độ</label>
                <select th:field="*{level}">
                    <option value="ALL">ALL</option>
                    <option value="BEGINNER">BEGINNER</option>
                    <option value="INTERMEDIATE">INTERMEDIATE</option>
                    <option value="ADVANCED">ADVANCED</option>
                </select>
            </div>

            <div class="form-group">
                <label>Loại giá</label>
                <select th:field="*{priceType}">
                    <option value="PAID">PAID</option>
                    <option value="FREE">FREE</option>
                    <option value="CONTACT">CONTACT</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Giá bán</label>
                <input type="number" th:field="*{price}">
            </div>

            <div class="form-group">
                <label>Giá gốc</label>
                <input type="number" th:field="*{originalPrice}">
            </div>
        </div>

        <div class="form-group">
            <label>Thời lượng (VD: 6h18p)</label>
            <input type="text" th:field="*{durationText}">
        </div>

        <button type="submit">Lưu</button>
        <a th:href="@{/admin/course}">Hủy</a>

    </form>

</body>
</html>
