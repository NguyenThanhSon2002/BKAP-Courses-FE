<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${course.id} != null ? 'Sửa khóa học' : 'Thêm khóa học mới'">Form</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .page-wrapper {
            max-width: 780px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .back-link:hover { color: #374151; }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: #111827;
        }

        .page-subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-top: 4px;
        }

        /* Tab navigation */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 0;
            border-bottom: 2px solid #e5e7eb;
        }

        .tab-btn {
            padding: 12px 24px;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 500;
            color: #6b7280;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }

        .tab-btn:hover:not(.active) { color: #374151; }

        /* Card */
        .card {
            background: white;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            padding: 32px;
        }

        /* Tab panels */
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Form layout */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            letter-spacing: 0.02em;
        }

        .required::after {
            content: ' *';
            color: #ef4444;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            color: #111827;
            background: #fafafa;
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
            background: white;
        }

        textarea { height: 110px; resize: vertical; }

        select { cursor: pointer; }

        .hint {
            font-size: 12px;
            color: #9ca3af;
        }

        /* Section title inside panel */
        .section-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #9ca3af;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f3f4f6;
        }

        /* Divider */
        .divider {
            grid-column: 1 / -1;
            border: none;
            border-top: 1px solid #f3f4f6;
            margin: 8px 0;
        }

        /* Price tag display */
        .price-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Footer actions */
        .form-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #f3f4f6;
        }

        .btn-cancel {
            padding: 10px 20px;
            border: 1px solid #d1d5db;
            background: white;
            border-radius: 8px;
            font-size: 14px;
            color: #374151;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-cancel:hover { background: #f9fafb; }

        .btn-save {
            padding: 10px 24px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-save:hover { background: #1d4ed8; }

        /* Step indicator */
        .step-hint {
            font-size: 13px;
            color: #9ca3af;
        }

        .btn-next {
            padding: 10px 24px;
            background: #111827;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-next:hover { background: #374151; }
    </style>
</head>
<body>

<div class="page-wrapper">

    <!-- Header -->
    <div class="page-header">
        <a th:href="@{/admin/course}" class="back-link">← Quay lại danh sách</a>
        <h1 class="page-title" th:text="${course.id} != null ? 'Sửa khóa học' : 'Thêm khóa học mới'">Form</h1>
        <p class="page-subtitle" th:text="${course.id} != null ? 'Cập nhật thông tin khóa học #' + ${course.id} : 'Điền thông tin để tạo khóa học mới'"></p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tab1', this)">📝 Thông tin cơ bản</button>
        <button class="tab-btn" onclick="switchTab('tab2', this)">💰 Chi tiết & Giá</button>
    </div>

    <div class="card">
        <form th:action="@{/admin/course/save}" th:object="${course}" method="post" id="courseForm">
            <input type="hidden" th:field="*{id}">

            <!-- ===== TAB 1: Thông tin cơ bản ===== -->
            <div id="tab1" class="tab-panel active">
                <p class="section-title">Thông tin khóa học</p>

                <div class="form-grid">

                    <div class="form-group full">
                        <label class="required">Tên khóa học</label>
                        <input type="text" th:field="*{title}" placeholder="VD: Frontend Developer với React" required>
                    </div>

                    <div class="form-group full">
                        <label class="required">Slug (URL)</label>
                        <input type="text" th:field="*{slug}" placeholder="VD: frontend-developer-react" required>
                        <span class="hint">Dùng cho đường dẫn URL, chỉ dùng chữ thường và dấu gạch ngang</span>
                    </div>

                    <div class="form-group full">
                        <label>Mô tả ngắn</label>
                        <input type="text" th:field="*{subtitle}" placeholder="VD: React • Tailwind • Figma">
                        <span class="hint">Hiển thị dưới tiêu đề khóa học</span>
                    </div>

                    <div class="form-group full">
                        <label>Mô tả chi tiết</label>
                        <textarea th:field="*{description}" placeholder="Mô tả nội dung, mục tiêu học viên đạt được..."></textarea>
                    </div>

                    <hr class="divider">

                    <div class="form-group">
                        <label>Danh mục</label>
                        <select th:field="*{category}">
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Giảng viên</label>
                        <select th:field="*{instructor}">
                            <option th:each="ins : ${instructors}"
                                    th:value="${ins.id}"
                                    th:text="${ins.fullname}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Cấp độ</label>
                        <select th:field="*{level}">
                            <option value="ALL">Tất cả cấp độ</option>
                            <option value="BEGINNER">Cơ bản</option>
                            <option value="INTERMEDIATE">Trung cấp</option>
                            <option value="ADVANCED">Nâng cao</option>
                        </select>
                    </div>

                </div>

                <div class="form-footer">
                    <a th:href="@{/admin/course}" class="btn-cancel">Hủy</a>
                    <button type="button" class="btn-next" onclick="switchTab('tab2', document.querySelectorAll('.tab-btn')[1])">
                        Tiếp theo →
                    </button>
                </div>
            </div>

            <!-- ===== TAB 2: Chi tiết & Giá ===== -->
            <div id="tab2" class="tab-panel">
                <p class="section-title">Hình ảnh & Media</p>

                <div class="form-grid">

                    <div class="form-group full">
                        <label>Ảnh thumbnail (URL)</label>
                        <input type="text" th:field="*{thumbnailUrl}" placeholder="https://...">
                    </div>

                    <div class="form-group full">
                        <label>Video giới thiệu (URL)</label>
                        <input type="text" th:field="*{previewVideoUrl}" placeholder="https://youtube.com/embed/...">
                    </div>

                    <hr class="divider">

                </div>

                <p class="section-title" style="margin-top: 20px;">Giá & Thống kê</p>

                <div class="form-grid">

                    <div class="form-group">
                        <label>Loại giá</label>
                        <select th:field="*{priceType}">
                            <option value="PAID">Trả phí</option>
                            <option value="FREE">Miễn phí</option>
                            <option value="CONTACT">Liên hệ</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Thời lượng</label>
                        <input type="text" th:field="*{durationText}" placeholder="VD: 6h18p">
                    </div>

                    <div class="form-group">
                        <label>Giá bán (VNĐ)</label>
                        <input type="number" th:field="*{price}" placeholder="0">
                    </div>

                    <div class="form-group">
                        <label>Giá gốc (VNĐ)</label>
                        <input type="number" th:field="*{originalPrice}" placeholder="0">
                        <span class="hint">Dùng để hiển thị giá gạch ngang</span>
                    </div>

                </div>

                <div class="form-footer">
                    <span class="step-hint">Bước 2 / 2</span>
                    <button type="button" class="btn-cancel" onclick="switchTab('tab1', document.querySelectorAll('.tab-btn')[0])">← Quay lại</button>
                    <button type="submit" class="btn-save">💾 Lưu khóa học</button>
                </div>
            </div>

        </form>
    </div>
</div>

<script>
    function switchTab(tabId, clickedBtn) {
        // Ẩn tất cả panel
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        // Bỏ active tất cả tab button
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        // Hiện panel và active button được chọn
        document.getElementById(tabId).classList.add('active');
        clickedBtn.classList.add('active');
    }
</script>

</body>
</html>
